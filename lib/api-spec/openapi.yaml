openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gig Trail Tour Calculator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: Artist/band profile management
  - name: vehicles
    description: Vehicle management
  - name: runs
    description: Single show calculations
  - name: venues
    description: Venue memory and suggestions
  - name: tours
    description: Multi-stop tour management
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: getProfiles
      tags: [profiles]
      summary: List all profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profiles/{id}/track-calculation:
    post:
      operationId: trackCalculation
      tags: [profiles]
      summary: Track a calculation attempt (enforces weekly limits)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calculation allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackCalculationResponse"
        "403":
          description: Weekly limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackCalculationResponse"

  /vehicles:
    get:
      operationId: getVehicles
      tags: [vehicles]
      summary: List all vehicles
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "201":
          description: Created vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /runs:
    get:
      operationId: getRuns
      tags: [runs]
      summary: List all single show calculations
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Run"
    post:
      operationId: createRun
      tags: [runs]
      summary: Create a single show calculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunBody"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  /runs/{id}:
    get:
      operationId: getRun
      tags: [runs]
      summary: Get a run by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRun
      tags: [runs]
      summary: Update a run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRunBody"
      responses:
        "200":
          description: Updated run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
    delete:
      operationId: deleteRun
      tags: [runs]
      summary: Delete a run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /venues:
    get:
      operationId: getVenues
      tags: [venues]
      summary: List all venues for user
      responses:
        "200":
          description: List of venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"
    post:
      operationId: createOrUpdateVenue
      tags: [venues]
      summary: Create or update a venue (upserts by normalised name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVenueBody"
      responses:
        "201":
          description: Created or updated venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"

  /venues/search:
    get:
      operationId: searchVenues
      tags: [venues]
      summary: Search venues by name prefix
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"

  /venues/{id}:
    delete:
      operationId: deleteVenue
      tags: [venues]
      summary: Delete a venue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tours:
    get:
      operationId: getTours
      tags: [tours]
      summary: List all tours
      responses:
        "200":
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"
    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTourBody"
      responses:
        "201":
          description: Created tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  /tours/{id}:
    get:
      operationId: getTour
      tags: [tours]
      summary: Get a tour with all its stops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tour with stops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourWithStops"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTourBody"
      responses:
        "200":
          description: Updated tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tours/{tourId}/stops:
    get:
      operationId: getTourStops
      tags: [tours]
      summary: List stops for a tour
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourStop"
    post:
      operationId: createTourStop
      tags: [tours]
      summary: Add a stop to a tour
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTourStopBody"
      responses:
        "201":
          description: Created stop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourStop"

  /tours/{tourId}/stops/{stopId}:
    patch:
      operationId: updateTourStop
      tags: [tours]
      summary: Update a tour stop
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTourStopBody"
      responses:
        "200":
          description: Updated stop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourStop"
    delete:
      operationId: deleteTourStop
      tags: [tours]
      summary: Delete a tour stop
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent:
    get:
      operationId: getDashboardRecent
      tags: [dashboard]
      summary: Get recent runs and tours for dashboard
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardRecent"

  /dashboard/tour-items:
    get:
      operationId: getDashboardTourItems
      tags: [dashboard]
      summary: Unified upcoming tour items (runs + tour stops) for Tour View
      responses:
        "200":
          description: Upcoming tour items sorted by showDate ASC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DuplicateProtection:
      type: object
      properties:
        duplicateFound:
          type: boolean
        matchingRecordIds:
          type: array
          items:
            type: integer
        summaries:
          type: array
          items: {}
        matchingRecords:
          type: array
          items: {}
        rules:
          type: array
          items:
            type: string
      required:
        - duplicateFound

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        actType:
          type: string
        homeBase:
          type: ["string", "null"]
        homeBaseLat:
          type: ["number", "null"]
        homeBaseLng:
          type: ["number", "null"]
        peopleCount:
          type: integer
        bandMembers:
          type: ["string", "null"]
        defaultVehicleId:
          type: ["integer", "null"]
        vehicleType:
          type: string
        vehicleName:
          type: ["string", "null"]
        fuelConsumption:
          type: number
        expectedGigFee:
          type: number
        minTakeHomePerPerson:
          type: number
        accommodationRequired:
          type: boolean
        accommodationType:
          type: ["string", "null"]
        avgAccomPerNight:
          type: number
        avgFoodPerDay:
          type: number
        maxDriveHoursPerDay:
          type: ["integer", "null"]
        defaultFuelPrice:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        calculationsThisWeek:
          type: integer
        lastCalculationReset:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - actType
        - homeBase
        - peopleCount
        - defaultVehicleId
        - vehicleType
        - fuelConsumption
        - expectedGigFee
        - minTakeHomePerPerson
        - accommodationRequired
        - avgAccomPerNight
        - avgFoodPerDay
        - defaultFuelPrice
        - notes
        - calculationsThisWeek
        - lastCalculationReset
        - createdAt

    TrackCalculationResponse:
      type: object
      properties:
        allowed:
          type: boolean
        count:
          type: integer
        limit:
          type: ["integer", "null"]
      required:
        - allowed
        - count
        - limit

    CreateProfileBody:
      type: object
      properties:
        name:
          type: string
        actType:
          type: string
        homeBase:
          type: ["string", "null"]
        homeBaseLat:
          type: ["number", "null"]
        homeBaseLng:
          type: ["number", "null"]
        peopleCount:
          type: integer
        bandMembers:
          type: ["string", "null"]
        defaultVehicleId:
          type: ["integer", "null"]
        vehicleType:
          type: string
        vehicleName:
          type: ["string", "null"]
        fuelConsumption:
          type: number
        expectedGigFee:
          type: number
        minTakeHomePerPerson:
          type: number
        accommodationRequired:
          type: boolean
        accommodationType:
          type: ["string", "null"]
        avgAccomPerNight:
          type: number
        avgFoodPerDay:
          type: number
        maxDriveHoursPerDay:
          type: ["integer", "null"]
        defaultFuelPrice:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name
        - actType
        - peopleCount
        - avgAccomPerNight
        - avgFoodPerDay

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        actType:
          type: string
        homeBase:
          type: ["string", "null"]
        homeBaseLat:
          type: ["number", "null"]
        homeBaseLng:
          type: ["number", "null"]
        peopleCount:
          type: integer
        bandMembers:
          type: ["string", "null"]
        activeMemberIds:
          type: ["string", "null"]
        defaultVehicleId:
          type: ["integer", "null"]
        vehicleType:
          type: string
        vehicleName:
          type: ["string", "null"]
        fuelConsumption:
          type: number
        expectedGigFee:
          type: number
        minTakeHomePerPerson:
          type: number
        accommodationRequired:
          type: boolean
        accommodationType:
          type: ["string", "null"]
        avgAccomPerNight:
          type: number
        singleRoomsDefault:
          type: integer
        doubleRoomsDefault:
          type: integer
        avgFoodPerDay:
          type: number
        maxDriveHoursPerDay:
          type: ["integer", "null"]
        defaultFuelPrice:
          type: ["number", "null"]
        defaultPetrolPrice:
          type: ["number", "null"]
        defaultDieselPrice:
          type: ["number", "null"]
        defaultLpgPrice:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        fuelType:
          type: string
        avgConsumption:
          type: number
        maxPassengers:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        duplicateProtection:
          $ref: "#/components/schemas/DuplicateProtection"
      required:
        - id
        - name
        - fuelType
        - avgConsumption
        - maxPassengers
        - notes
        - createdAt

    CreateVehicleBody:
      type: object
      properties:
        name:
          type: string
        fuelType:
          type: string
        avgConsumption:
          type: number
        maxPassengers:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name
        - fuelType
        - avgConsumption

    Venue:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["string", "null"]
        profileId:
          type: ["integer", "null"]
        venueName:
          type: string
        normalizedVenueName:
          type: string
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        lastTotalProfit:
          type: ["number", "null"]
        lastStatus:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        suburb:
          type: ["string", "null"]
        fullAddress:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        capacity:
          type: ["integer", "null"]
        website:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        productionContactName:
          type: ["string", "null"]
        productionContactPhone:
          type: ["string", "null"]
        productionContactEmail:
          type: ["string", "null"]
        roomNotes:
          type: ["string", "null"]
        venueStatus:
          type: ["string", "null"]
          enum: ["great", "risky", "avoid", "untested", null]
        willPlayAgain:
          type: ["string", "null"]
          enum: ["yes", "no", "unsure", null]
        accommodationAvailable:
          type: ["boolean", "null"]
        riderProvided:
          type: ["boolean", "null"]
        playingDays:
          type: ["array", "null"]
          items:
            type: string
        venueNotes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - venueName
        - normalizedVenueName
        - createdAt
        - updatedAt

    CreateVenueBody:
      type: object
      properties:
        venueName:
          type: string
        profileId:
          type: ["integer", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        lastTotalProfit:
          type: ["number", "null"]
        lastStatus:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        suburb:
          type: ["string", "null"]
        fullAddress:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        capacity:
          type: ["integer", "null"]
        website:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        productionContactName:
          type: ["string", "null"]
        productionContactPhone:
          type: ["string", "null"]
        productionContactEmail:
          type: ["string", "null"]
        roomNotes:
          type: ["string", "null"]
        venueStatus:
          type: ["string", "null"]
          enum: ["great", "risky", "avoid", "untested", null]
        willPlayAgain:
          type: ["string", "null"]
          enum: ["yes", "no", "unsure", null]
        accommodationAvailable:
          type: ["boolean", "null"]
        riderProvided:
          type: ["boolean", "null"]
        playingDays:
          type: ["array", "null"]
          items:
            type: string
        venueNotes:
          type: ["string", "null"]
      required:
        - venueName

    Run:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: ["integer", "null"]
        vehicleId:
          type: ["integer", "null"]
        venueId:
          type: ["integer", "null"]
        venueName:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        showDate:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/RunStatus"
        origin:
          type: ["string", "null"]
        originLat:
          type: ["number", "null"]
        originLng:
          type: ["number", "null"]
        destination:
          type: ["string", "null"]
        destinationLat:
          type: ["number", "null"]
        destinationLng:
          type: ["number", "null"]
        distanceKm:
          type: number
        returnTrip:
          type: boolean
        fuelPrice:
          type: number
        showType:
          type: string
        fee:
          type: ["number", "null"]
        capacity:
          type: ["integer", "null"]
        ticketPrice:
          type: ["number", "null"]
        expectedAttendancePct:
          type: ["number", "null"]
        dealType:
          type: ["string", "null"]
        splitPct:
          type: ["number", "null"]
        guarantee:
          type: ["number", "null"]
        merchEstimate:
          type: ["number", "null"]
        marketingCost:
          type: ["number", "null"]
        accommodationRequired:
          type: boolean
        accommodationType:
          type: ["string", "null"]
        accommodationNights:
          type: ["number", "null"]
        accommodationCost:
          type: ["number", "null"]
        foodCost:
          type: ["number", "null"]
        extraCosts:
          type: ["number", "null"]
